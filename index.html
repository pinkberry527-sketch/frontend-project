<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-center p-4">

        <li class="p-3 w-full bg-gray-700 hover:bg-green-300 transition-colors rounded-lg text-center text-white text-sm font-semibold"><a href="#" class="block">Instagram</a></li>

</div>
<footer class="text-xs text-center text-gray-500 mt-6">
